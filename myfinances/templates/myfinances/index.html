<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Montly finance index</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />
</head>

<body>
	<header>
		{% load static %}

		<link rel="stylesheet" href="{% static 'myfinances/style.css' %}" />
	</header>
	<main>

		<div class="container-fluid my-3">

			<h1 class="row justify-content-center">List of Montly Periods</h1>

			<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPeriodModal">
				Add new period.
			</button>


			<div class="table-responsive-md my-2">
				<table class="table table-bordered table-hover table-striped table-info ">
					<thead>
						<tr>
							<th scope="col">Period</th>
							<th scope="col">Sum</th>
						</tr>
					</thead>
					<tbody>
						{% if latest_monthlyfin_list %}
						{% for monthlyfin in latest_monthlyfin_list %}
						<tr class="clickable-row" data-href="{% url 'myfinances:detail' monthlyfin.id %}"
							style="cursor: pointer;">
							<td>{{monthlyfin.month_text}}</td>
							<td>{{monthlyfin.summ}}</td>
						</tr>
						{% endfor %}
						{% else %}
						<tr>
							<td colspan="2">No monthly finances available.</td>
						</tr>
						{% endif %}
					</tbody>

				</table>
			</div>
		</div>

		<div class="modal fade" id="addPeriodModal" tabindex="-1" aria-labelledby="addCheckLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="addCheckLabel">Add new Period</h5>
						<button type="button" class="btn-close btn-danger" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<form method="post" action="{% url 'myfinances:index' %}">
							{% csrf_token %}
							{{ form.as_p }}
							<button type="submit" class="btn btn-primary">Save changes</button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</main>
	<hr>
	<footer>
		<div class="container-fluid my-1">
			<a href="#">
				<button type="button" class="btn btn-outline-light" href="#">Back to top</button>
			</a>
		</div>
	</footer>
	<script>
		document.addEventListener("DOMContentLoaded", () => {
			const rows = document.querySelectorAll(".clickable-row");
			rows.forEach(row => {
				row.addEventListener("click", () => {
					window.location.href = row.dataset.href;
				});
			});
		}); 
	</script>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
		integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
		crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
		integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
		crossorigin="anonymous"></script>
</body>

</html>
